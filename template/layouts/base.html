<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page_title|default:"WebGIS Clustering" }}{% endblock %}</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        maroon: { 900: '#3E0000', 800: '#5A0808', 700: '#800000' },
                        gold: { 500: '#C5A059', 400: '#D4AF37' }
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-[#F8F9FA] text-gray-800 font-sans h-screen flex flex-col overflow-hidden selection:bg-gold-500 selection:text-white">
    
    {% block navbar %}
        {% include 'layouts/partials/navbar.html' %}
    {% endblock %}
    
    <div class="flex flex-1 overflow-hidden h-[calc(100vh-5rem)]">
        {% block sidebar %}
            {% include 'layouts/partials/sidebar.html' %}
        {% endblock %}
        
        <main class="flex-1 overflow-y-auto w-full relative">
            <!-- Subtle background accent -->
            <div class="absolute top-0 right-0 w-[600px] h-[400px] bg-gradient-to-bl from-maroon-900/5 to-transparent rounded-bl-full pointer-events-none -z-10"></div>
            
            {% block content %}{% endblock %}

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.toggle('-translate-x-full');
                    } else {
                        sidebar.classList.toggle('lg:-ml-72');
                    }
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
